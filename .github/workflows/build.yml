name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build App
        run: APPLE_SIGNING_IDENTITY="-" cargo tauri build

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Free-Proxy-macOS.dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Free-Proxy-macOS
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenCode-Free-Proxy-macOS.dmg/*.dmg
          body: |
            ## OpenCode Free Proxy

            Download the latest macOS build below.

            ### How to use
            1. Download the `.dmg` file
            2. Open it and drag the app to Applications
            3. First open: System Settings → Privacy → "Open anyway"
          draft: false
          prerelease: false
