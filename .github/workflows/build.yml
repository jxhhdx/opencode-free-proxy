name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm deps
        run: npm install

      - name: Build App
        uses: tauri-apps/tauri-action@v2
        env:
          APPLE_SIGNING_IDENTITY: "-"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeDebug: false

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Free-Proxy-macOS.dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

  create-release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenCode-Free-Proxy-macOS.dmg/*.dmg
          body: |
            ## OpenCode Free Proxy v${{ github.ref_name }}

            Download the latest macOS build below.

            ### How to use
            1. Download the `.dmg` file
            2. Open it and drag the app to Applications
            3. First time: System Settings → Privacy & Security → "Open anyway"
          draft: false
          prerelease: false
