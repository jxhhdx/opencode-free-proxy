<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode Free Proxy</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        surface: '#181a22',
        surface2: '#1e2030',
        border: '#2a2d3e',
        muted: '#8b8fa3',
      }
    }
  }
}
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f1117] text-[#e1e3eb] font-sans antialiased select-none min-h-screen">

<div class="max-w-2xl mx-auto px-6 py-5">

  <!-- ═══ Header ═══ -->
  <header class="flex justify-between items-start pb-4 mb-6 border-b border-[#2a2d3e]">
    <div class="flex items-center gap-3">
      <div class="text-[#6c8cff] flex">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="currentColor" opacity="0.15"/>
          <path d="M8 14l4-4 4 4-4 4-4-4z" fill="currentColor" opacity="0.6"/>
          <path d="M20 14l-4 4-4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <h1 class="text-xl font-semibold tracking-tight">OpenCode Free Proxy</h1>
        <div class="flex items-center gap-2 text-sm text-muted mt-0.5">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">正在启动...</span>
          <span class="text-[#2a2d3e]">·</span>
          <span onclick="copyText('http://localhost:6446')" class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded bg-surface2 border border-border cursor-pointer hover:border-[#6c8cff] hover:bg-[#6c8cff]/10 transition-all text-xs group">
            <code class="text-[#6c8cff]">http://localhost:6446</code>
            <span class="text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">📋</span>
          </span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <label class="flex items-center gap-1.5 text-xs text-muted cursor-pointer select-none" title="号池模式：模型失败时自动按优先级切换">
        <span id="poolModeLabel">号池关</span>
        <div class="relative w-8 h-4 rounded-full transition-colors bg-[#2a2d3e]" id="poolToggle">
          <div class="absolute top-0.5 left-0.5 w-3 h-3 rounded-full bg-muted transition-all" id="poolToggleDot"></div>
          <input type="checkbox" id="poolModeInput" class="sr-only" onchange="togglePoolMode()" />
        </div>
      </label>
      <button id="refreshBtn" onclick="refreshStatus()" class="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-md bg-surface2 text-muted border border-border text-xs font-medium hover:bg-border hover:text-white transition-all active:scale-95 cursor-pointer">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 0111.2-3M14 8a6 6 0 01-11.2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 2v4h-4M2 14v-4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        刷新
      </button>
    </div>
  </header>

  <!-- ═══ API Keys ═══ -->
  <section class="bg-surface border border-border rounded-xl p-4 mb-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><rect x="3" y="7" width="12" height="4" rx="1.5" stroke="currentColor" stroke-width="1.2"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/></svg>
        API Keys
      </h2>
      <span class="text-[11px] px-2 py-0.5 rounded-full bg-surface2 text-muted" id="keyCount">0</span>
    </div>
    <div class="flex flex-col gap-2" id="keyList"></div>
  </section>

  <!-- ═══ Models & Speed Test ═══ -->
  <section class="bg-surface border border-border rounded-xl p-4 mb-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-sm font-semibold flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M9 2v14M2 9h14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.2"/></svg>
        模型号池
      </h2>
      <div class="flex items-center gap-2">
        <button id="batchTestBtn" onclick="batchTestAll()" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-md bg-[#6c8cff] text-white text-xs font-medium hover:bg-[#4a6adf] transition-all active:scale-95 cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed">⚡ 一键测速</button>
        <span class="text-[11px] px-2 py-0.5 rounded-full bg-surface2 text-muted" id="modelCount">0</span>
      </div>
    </div>
    <!-- Add Provider Dialog -->
    <div id="addDialog" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
      <div class="bg-surface border border-border rounded-xl p-5 w-full max-w-sm mx-4 shadow-2xl">
        <h3 class="text-sm font-semibold mb-4">添加提供商</h3>
        <div class="flex flex-col gap-3">
          <input id="dlgName" placeholder="名称 *" class="w-full px-3 py-2 rounded-md bg-surface2 border border-border text-sm text-white placeholder-muted outline-none focus:border-[#6c8cff] transition-colors" autofocus />
          <input id="dlgModel" placeholder="模型名 *" class="w-full px-3 py-2 rounded-md bg-surface2 border border-border text-sm text-white placeholder-muted outline-none focus:border-[#6c8cff] transition-colors" />
          <input id="dlgUrl" placeholder="API 地址（可选，为空使用 OpenCode 免费）" class="w-full px-3 py-2 rounded-md bg-surface2 border border-border text-sm text-white placeholder-muted outline-none focus:border-[#6c8cff] transition-colors" />
          <input id="dlgKey" type="password" placeholder="API Key（可选）" class="w-full px-3 py-2 rounded-md bg-surface2 border border-border text-sm text-white placeholder-muted outline-none focus:border-[#6c8cff] transition-colors" />
        </div>
        <div class="flex justify-end gap-2 mt-4">
          <button onclick="hideAddDialog()" class="px-3.5 py-2 rounded-md bg-surface2 text-muted text-xs font-medium border border-border hover:bg-border transition-all cursor-pointer">取消</button>
          <button onclick="confirmAddProvider()" class="px-3.5 py-2 rounded-md bg-[#6c8cff] text-white text-xs font-medium hover:bg-[#4a6adf] transition-all cursor-pointer">添加</button>
        </div>
      </div>
    </div>
    <div class="flex flex-col gap-1.5" id="modelList">
      <div class="text-center py-5 text-muted text-sm" id="modelEmpty">加载模型中...</div>
    </div>
  </section>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-surface2 border border-border px-5 py-2.5 rounded-md text-sm text-white opacity-0 transition-opacity duration-250 pointer-events-none z-50"></div>

<script src="main.js"></script>
</body>
</html>
